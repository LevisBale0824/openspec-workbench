name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  # =============================================================
  # Linux AppImage — built inside CentOS 7 Docker for glibc 2.17+
  # (compatible with RHEL 8 / glibc 2.28+)
  # =============================================================
  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Build AppImage in CentOS 7 container
        run: |
          docker build -t openspec-builder -f scripts/Dockerfile.linux .
          docker run --rm \
            -v "$PWD:/workspace" \
            -v "$PWD/output:/output" \
            openspec-builder

      - name: List output artifacts
        run: ls -lh output/

      - uses: actions/upload-artifact@v4
        with:
          name: openspec-workbench-linux-x86_64.AppImage
          path: output/*.AppImage

      - name: Upload to release (if tag)
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          gh release upload "${GITHUB_REF#refs/tags/}" output/*.AppImage --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # =============================================================
  # Windows MSI + NSIS installer
  # =============================================================
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Windows bundles
        run: pnpm tauri build --ci --bundles msi,nsis

      - name: List output artifacts
        run: |
          Get-ChildItem -Recurse -Filter *.msi src-tauri/target/release/bundle/
          Get-ChildItem -Recurse -Filter *.exe src-tauri/target/release/bundle/nsis/

      - uses: actions/upload-artifact@v4
        with:
          name: openspec-workbench-windows-x86_64
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe

      - name: Upload to release (if tag)
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          $tag = "${{ github.ref }}" -replace 'refs/tags/', ''
          gh release upload $tag src-tauri/target/release/bundle/msi/*.msi --clobber
          gh release upload $tag src-tauri/target/release/bundle/nsis/*.exe --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
