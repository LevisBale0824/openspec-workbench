<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OpenSpec Workbench</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  </head>
  <body class="bg-zinc-950 text-zinc-100">
    <div id="app"></div>
    <script>
      window.onerror = function(msg, src, line, col, err) {
        var el = document.getElementById('app');
        if (el) el.innerHTML = '<pre style="color:red;padding:20px;">ERROR: ' + msg + '\\n' + src + ':' + line + ':' + col + '\\n' + (err ? err.stack : '') + '</pre>';
      };
      window.addEventListener('unhandledrejection', function(ev) {
        var el = document.getElementById('app');
        if (el) el.innerHTML += '<pre style="color:orange;padding:20px;">UNHANDLED: ' + (ev.reason ? ev.reason.stack || ev.reason : ev) + '</pre>';
      });
    </script>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
